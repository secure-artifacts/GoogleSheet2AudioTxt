name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "手动运行时使用的 Release Tag，例如 v1.0.0。如果留空，会自动使用 manual-build-运行编号。"
        required: false
        default: ""

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  APP_NAME: GoogleSheet2AudioTxt
  ENTRY_SCRIPT: GoogleSheet2AudioTxt.py

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact_name: GoogleSheet2AudioTxt-Windows
            output_name: GoogleSheet2AudioTxt.exe
            pyinstaller_args: --onefile --windowed --name GoogleSheet2AudioTxt
            dist_path: dist/GoogleSheet2AudioTxt.exe

          - name: macOS
            os: macos-latest
            artifact_name: GoogleSheet2AudioTxt-macOS
            output_name: GoogleSheet2AudioTxt-macOS
            pyinstaller_args: --onefile --windowed --name GoogleSheet2AudioTxt
            dist_path: dist/GoogleSheet2AudioTxt

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check project files
        shell: bash
        run: |
          echo "Current directory:"
          pwd
          echo "Files:"
          ls -la

          if [ ! -f "${{ env.ENTRY_SCRIPT }}" ]; then
            echo "ERROR: Entry script not found: ${{ env.ENTRY_SCRIPT }}"
            exit 1
          fi

          if [ ! -f "requirements.txt" ]; then
            echo "ERROR: requirements.txt not found"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller
        shell: bash
        run: |
          pyinstaller ${{ matrix.pyinstaller_args }} "${{ env.ENTRY_SCRIPT }}"
          ls -la dist

      - name: Rename macOS executable
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mv "${{ matrix.dist_path }}" "dist/${{ matrix.output_name }}"

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            certutil -hashfile "${{ matrix.output_name }}" SHA256 > "${{ matrix.output_name }}.sha256.txt"
          else
            shasum -a 256 "${{ matrix.output_name }}" > "${{ matrix.output_name }}.sha256.txt"
          fi

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/${{ matrix.output_name }}
            dist/${{ matrix.output_name }}.sha256.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.output_name }}
            dist/${{ matrix.output_name }}.sha256.txt
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Decide release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=manual-build-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show release assets
        shell: bash
        run: |
          find release-assets -maxdepth 3 -type f

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Release ${{ steps.release_tag.outputs.tag }}
          files: |
            release-assets/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
