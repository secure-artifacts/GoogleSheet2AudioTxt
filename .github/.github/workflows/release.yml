name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  APP_NAME: AutoSheetMediaBuilder
  ENTRY_SCRIPT: XL-GoogleSheet2Audio_Txt.py

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact_name: AutoSheetMediaBuilder-Windows
            output_name: AutoSheetMediaBuilder.exe
            pyinstaller_args: --onefile --windowed --name AutoSheetMediaBuilder
            dist_path: dist/AutoSheetMediaBuilder.exe

          - name: macOS
            os: macos-latest
            artifact_name: AutoSheetMediaBuilder-macOS
            output_name: AutoSheetMediaBuilder-macOS
            pyinstaller_args: --onefile --windowed --name AutoSheetMediaBuilder
            dist_path: dist/AutoSheetMediaBuilder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller ${{ matrix.pyinstaller_args }} ${{ env.ENTRY_SCRIPT }}

      - name: Rename macOS executable
        if: runner.os == 'macOS'
        run: |
          mv "${{ matrix.dist_path }}" "dist/${{ matrix.output_name }}"

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          cd dist
          if [ "${{ runner.os }}" = "Windows" ]; then
            certutil -hashfile "${{ matrix.output_name }}" SHA256 > "${{ matrix.output_name }}.sha256.txt"
          else
            shasum -a 256 "${{ matrix.output_name }}" > "${{ matrix.output_name }}.sha256.txt"
          fi

      - name: Generate build provenance attestation
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/${{ matrix.output_name }}
            dist/${{ matrix.output_name }}.sha256.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.output_name }}
            dist/${{ matrix.output_name }}.sha256.txt
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-assets

      - name: Show release assets
        run: |
          find release-assets -type f -maxdepth 3

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
